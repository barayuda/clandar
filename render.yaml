# render.yaml — Render Blueprint for Clandar
# https://render.com/docs/blueprint-spec
#
# Database: Turso cloud SQLite (free tier) — no persistent disk needed.
# Server:   Render free web service.
#
# After first deploy, set secrets in Render Dashboard → Environment:
#   TURSO_DATABASE_URL  → libsql://your-db.turso.io
#   TURSO_AUTH_TOKEN    → your-turso-token
#   CALENDARIFIC_API_KEY → (optional) your-calendarific-key

services:
  - name: clandar
    type: web
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free               # Free works — no disk needed with Turso

    # Render calls this path to confirm the service is healthy.
    healthCheckPath: /health

    envVars:
      - key: LOG_LEVEL
        value: info

      - key: TURSO_DATABASE_URL
        sync: false          # Set in Render dashboard — keep it secret

      - key: TURSO_AUTH_TOKEN
        sync: false          # Set in Render dashboard — keep it secret

      - key: CALENDARIFIC_API_KEY
        sync: false          # Optional — improves ASEAN holiday coverage
